<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>推し手帳｜我的追星手帳</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Zen+Maru+Gothic:wght@400;500;700;900&family=Noto+Sans+TC:wght@300;400;500;700&display=swap" rel="stylesheet">
<!-- 引入 Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore-compat.js"></script>
<style>
  :root{
    --bg:#EEF7FC;
    --bg-deep:#DFF0FA;
    --surface:#FFFFFF;
    --surface-soft:#E7F5FC;
    --ink:#2E4C5E;
    --ink-soft:#7B98A9;
    --ink-faint:#B9D3E0;
    --sakura:#8FD3F4;
    --sakura-pale:#DEF2FC;
    --rose:#4FB8E8;
    --rose-deep:#2A8FC7;
    --matcha:#7DC4C9;
    --matcha-pale:#E0F3F2;
    --wisteria:#7FA8D9;
    --wisteria-pale:#E6EEFA;
    --gold:#5AA9D6;
    --shadow: 0 6px 20px rgba(42,143,199,0.12);
    --shadow-sm: 0 2px 8px rgba(42,143,199,0.10);
    --radius: 20px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0; width:100%; min-height:100%;}
  body{
    font-family:'Noto Sans TC', sans-serif;
    background:
      radial-gradient(circle at 15% 8%, rgba(143,211,244,0.22), transparent 40%),
      radial-gradient(circle at 90% 15%, rgba(127,168,217,0.16), transparent 45%),
      var(--bg);
    color:var(--ink);
    min-height:100vh;
  }
  .app{
    width:100%;
    max-width:none;
    min-height:100vh;
    background:transparent;
    display:flex;
    flex-direction:column;
    position:relative;
  }
  /* Content fills the full device width — no max-width cap, no centering */
  .top-row, main#mainContent{
    width:100%;
    box-sizing:border-box;
  }
  .maru{font-family:'Zen Maru Gothic', sans-serif;}

  /* ===== Header ===== */
  header.top{
    padding:22px 20px 16px;
    position:relative;
    overflow:hidden;
  }
  .petal{
    position:absolute;
    width:14px;height:14px;
    background:var(--sakura);
    border-radius: 0 60% 0 60%;
    opacity:0.5;
    animation:fall linear infinite;
  }
  @keyframes fall{
    0%{ transform: translateY(-20px) rotate(0deg); opacity:0;}
    10%{opacity:0.55;}
    100%{ transform: translateY(160px) rotate(200deg); opacity:0;}
  }
  .top-row{ display:flex; align-items:center; justify-content:space-between; position:relative; z-index:1;}
  .brand{ display:flex; align-items:center; gap:10px; }
  .brand-mark{
    width:40px;height:40px;border-radius:50%;
    background:var(--rose-deep);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-family:'Zen Maru Gothic';font-weight:700;font-size:18px;
    box-shadow: var(--shadow-sm);
    flex-shrink:0;
  }
  .brand-text .title{ font-family:'Zen Maru Gothic'; font-weight:700; font-size:19px; letter-spacing:0.5px;}
  .brand-text .sub{ font-size:11px; color:var(--ink-soft); margin-top:1px;}
  .profile-chip{
    display:flex; align-items:center; gap:6px;
    background:var(--surface);
    border:1px solid var(--sakura-pale);
    border-radius:999px;
    padding:6px 12px 6px 6px;
    cursor:pointer;
    box-shadow: var(--shadow-sm);
    font-size:12px;
    color:var(--ink-soft);
  }
  .profile-chip .dot{
    width:22px;height:22px;border-radius:50%;
    background:var(--wisteria-pale);
    display:flex;align-items:center;justify-content:center;
    font-size:12px;
  }

  /* ===== Tab content area ===== */
  main{
    flex:1;
    padding: 6px 18px 100px;
  }
  .section-title{
    font-family:'Zen Maru Gothic';
    font-weight:700;
    font-size:20px;
    margin: 10px 2px 14px;
    display:flex;
    align-items:center;
    gap:8px;
  }
  .section-title .stamp{
    width:30px;height:30px;border-radius:50%;
    background:var(--rose);
    color:#fff;
    display:flex;align-items:center;justify-content:center;
    font-family:'Zen Maru Gothic';font-weight:700;font-size:14px;
  }

  /* ===== responsive list grid (schedule/expense/fanlog/artists cards) ===== */
  .list-grid{ display:block; }
  @media (min-width:700px){
    .list-grid{ display:grid; grid-template-columns:repeat(auto-fill, minmax(320px,1fr)); gap:14px; align-items:stretch; }
    .list-grid .card{ margin-bottom:0; height:100%; display:flex; flex-direction:column; }
  }
  /* ===== cards ===== */
  .card{
    background:var(--surface);
    border-radius:var(--radius);
    padding:16px 16px;
    margin-bottom:12px;
    box-shadow: var(--shadow-sm);
    position:relative;
    border:1px solid rgba(0,0,0,0.02);
  }
  .card-row{ display:flex; justify-content:space-between; align-items:flex-start; gap:10px;}
  .card-title{ font-weight:700; font-size:15px; margin:0 0 3px;}
  .card-meta{ font-size:12.5px; color:var(--ink-soft); line-height:1.6;}
  .tag{
    display:inline-block;
    font-size:11px;
    padding:2px 9px;
    border-radius:999px;
    background:var(--sakura-pale);
    color:var(--rose-deep);
    margin-right:6px;
    margin-top:4px;
  }
  .tag.matcha{ background:var(--matcha-pale); color:#4E6B49;}
  .tag.wisteria{ background:var(--wisteria-pale); color:#5F4E7A;}
  .tag.gold{ background:#F7EAD1; color:#8A6A28;}
  .tag.rose{ background:#FDE0E8; color:#B23A5C;}
  .tag.sky{ background:#D9EEFB; color:#2A6F99;}
  .tag.peach{ background:#FFE3C2; color:#9C5A17;}
  .tag.lavender{ background:#E4D9FF; color:#5B3FA0;}
  .tag.mint{ background:#D8F3DC; color:#2F6B3F;}
  .tag.coral{ background:#FBD9F0; color:#9C3D82;}
  .tag.amber{ background:#FFF3C4; color:#8A6A28;}
  .tag.slate{ background:#E6E6E6; color:#555555;}
  .card-actions{ display:flex; gap:6px; flex-shrink:0;}
  .icon-btn{
    width:30px;height:30px;border-radius:50%;
    border:none; background:var(--bg-deep); color:var(--ink-soft);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer; font-size:14px;
    transition:0.15s;
  }
  .icon-btn:hover{ background:var(--sakura-pale); color:var(--rose-deep);}
  .icon-btn.del:hover{ background:#F7D9D9; color:#B54545;}

  .empty{
    text-align:center;
    padding:50px 20px;
    color:var(--ink-faint);
  }
  .empty .big{ font-size:34px; margin-bottom:8px;}
  .empty .msg{ font-size:13.5px; }

  /* Home dashboard */
  .greet{
    font-family:'Zen Maru Gothic';
    font-size:17px;
    font-weight:700;
    margin: 4px 2px 2px;
  }
  .greet-date{ font-size:12px; color:var(--ink-soft); margin: 0 2px 16px;}
  .stat-grid{
    display:grid; grid-template-columns:repeat(3,1fr); gap:10px;
    margin-bottom:18px;
  }
  .stat-card{
    background:var(--surface); border-radius:16px; padding:12px 8px;
    text-align:center; box-shadow:var(--shadow-sm);
  }
  .stat-card .num{ font-family:'Zen Maru Gothic'; font-size:19px; font-weight:700; color:var(--rose-deep);}
  .stat-card .lbl{ font-size:10.5px; color:var(--ink-soft); margin-top:2px;}
  .oshi-banner{
    background: linear-gradient(135deg, var(--sakura-pale), var(--wisteria-pale));
    border-radius:var(--radius);
    padding:16px;
    display:flex; gap:14px; align-items:center;
    margin-bottom:18px;
    box-shadow: var(--shadow-sm);
  }
  .oshi-banner img, .oshi-banner .ph{
    width:58px;height:58px;border-radius:50%;
    object-fit:cover; border:3px solid #fff; box-shadow:var(--shadow-sm);
    flex-shrink:0; background:var(--surface);
    display:flex;align-items:center;justify-content:center; font-size:22px;
  }
  .oshi-banner .name{ font-family:'Zen Maru Gothic'; font-weight:700; font-size:15px;}
  .oshi-banner .grp{ font-size:12px; color:var(--ink-soft); margin-top:1px;}
  .home-block{ margin-bottom:22px;}
  .home-block .block-head{
    display:flex; justify-content:space-between; align-items:center;
    margin:0 2px 10px;
  }
  .home-block .block-head h3{
    font-family:'Zen Maru Gothic'; font-size:14.5px; margin:0; font-weight:700;
    color:var(--ink);
  }
  .home-block .block-head a{
    font-size:11.5px; color:var(--rose-deep); cursor:pointer; text-decoration:none;
  }
  .mini-row{
    display:flex; justify-content:space-between; align-items:center;
    background:var(--surface); border-radius:14px; padding:10px 14px;
    margin-bottom:8px; box-shadow:var(--shadow-sm); font-size:13px;
  }
  .mini-row .l{ color:var(--ink); }
  .mini-row .r{ color:var(--ink-soft); font-size:11.5px;}

  /* ===== Schedule calendar ===== */
  .cal-filter-row{
    display:flex; gap:8px; overflow-x:auto; padding-bottom:6px; margin:0 2px 16px;
    scrollbar-width:thin;
  }
  .cal-filter-btn{
    flex-shrink:0; padding:7px 15px; border-radius:999px;
    border:1px solid var(--sakura-pale); background:var(--surface); color:var(--ink-soft);
    font-size:12.5px; font-family:'Noto Sans TC'; cursor:pointer; font-weight:500;
  }
  .cal-filter-btn.active{ background:var(--rose-deep); color:#fff; border-color:var(--rose-deep); font-weight:700;}
  .cal-filter-btn.qualify{ background:var(--matcha-pale); border-color:var(--matcha-pale); color:#3F6B45; font-weight:700;}
  .cal-filter-btn.qualify.active{ background:var(--rose-deep); border-color:var(--rose-deep); color:#fff;}
  .chip-filter-btn{
    flex-shrink:0; padding:7px 14px; border-radius:999px; border:2px solid transparent;
    font-size:12.5px; font-family:'Noto Sans TC'; cursor:pointer; font-weight:600;
    transition:0.15s;
  }
  .chip-filter-btn.active{ border-color:currentColor; }
  .chip-filter-btn:hover{ transform:translateY(-1px); }
  .cal-head{ display:flex; align-items:center; justify-content:space-between; margin:0 2px 14px;}
  .cal-title{ font-weight:700; font-size:16px;}
  .cal-nav-btn{
    width:32px;height:32px;border-radius:50%; border:none; background:var(--bg-deep);
    color:var(--ink-soft); font-size:17px; cursor:pointer; display:flex; align-items:center; justify-content:center;
  }
  .cal-nav-btn:hover{ background:var(--sakura-pale); color:var(--rose-deep);}
  .cal-grid{ display:grid; grid-template-columns:repeat(7,1fr); gap:6px; margin-bottom:20px; width:100%; }
  .cal-dow{ text-align:center; font-size:11.5px; font-weight:700; color:var(--ink-soft); padding-bottom:6px;}
  .cal-day{
    position:relative; min-height:78px; border-radius:12px; background:var(--surface);
    display:flex; flex-direction:column; align-items:stretch;
    cursor:pointer; box-shadow:var(--shadow-sm); padding:6px 5px; gap:2px;
    overflow:hidden;
  }
  .cal-day .daynum{ font-size:12px; font-weight:700; color:var(--ink); align-self:flex-start; }
  .cal-day.empty{ background:transparent; box-shadow:none; cursor:default;}
  .cal-day.today{ border:2px solid var(--rose-deep);}
  .cal-day.today .daynum{ color:var(--rose-deep); }
  .event-pill{
    display:block; width:100%; box-sizing:border-box;
    font-size:10px; line-height:1.5; padding:1px 6px; border-radius:6px;
    color:#fff; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;
    cursor:pointer;
  }
  .event-pill.ec0{ background:var(--rose-deep); }
  .event-pill.ec1{ background:#7DA687; }
  .event-pill.ec2{ background:#8B7CB6; }
  .event-pill.ec3{ background:#C99A45; }
  .event-pill.ec4{ background:#C97B84; }
  .event-more{ font-size:9.5px; color:var(--ink-soft); padding:1px 6px; }
  @media (min-width:700px){
    .cal-day{ min-height:120px; padding:8px 7px; }
    .cal-day .daynum{ font-size:13.5px; }
    .event-pill{ font-size:11.5px; padding:3px 8px; border-radius:8px; }
  }
  .cal-daylist-title{ font-family:'Zen Maru Gothic'; font-weight:700; font-size:14.5px; margin:4px 2px 14px; display:flex; align-items:center; gap:10px; flex-wrap:wrap;}
  .chip-clear{
    font-size:11px; border:none; background:var(--bg-deep); color:var(--ink-soft);
    border-radius:999px; padding:4px 12px; cursor:pointer; font-weight:500;
  }
  .chip-clear:hover{ background:var(--sakura-pale); color:var(--rose-deep);}

  /* ===== 年度／月份回顧 (schedule & fanlog) ===== */
  .review-block{ margin-bottom:22px;}
  .review-head{ font-weight:700; font-size:14.5px; margin:0 2px 10px;}
  .year-list{ display:flex; flex-direction:column; gap:10px;}
  .year-card{
    background:var(--surface); border-radius:16px; padding:13px 16px;
    cursor:pointer; box-shadow:var(--shadow-sm); border:2px solid transparent; transition:0.15s;
  }
  .year-card:hover{ transform:translateY(-1px);}
  .year-card.qualify{ background:var(--matcha-pale);}
  .year-card.active{ border-color:var(--rose-deep);}
  .year-num{ font-weight:700; font-size:17px;}
  .year-count{ font-size:12px; color:var(--ink-soft); margin-top:3px;}
  .year-msg{ font-size:12px; margin-top:5px; font-weight:700; color:#B54545;}
  .year-card.qualify .year-msg{ color:#4E6B49;}

  .month-grid{ display:grid; grid-template-columns:repeat(3,1fr); gap:8px;}
  .month-card{
    background:var(--surface); border-radius:14px; padding:10px 6px; text-align:center;
    cursor:pointer; box-shadow:var(--shadow-sm); border:2px solid transparent; transition:0.15s;
  }
  .month-card:hover{ transform:translateY(-1px);}
  .month-card.active{ border-color:var(--rose-deep);}
  .month-num{ font-weight:700; font-size:12.5px;}
  .month-count{ font-size:10px; color:var(--ink-soft); margin-top:3px;}
  .month-msg{ font-size:10px; margin-top:4px; font-weight:700; color:#B54545;}
  .month-card.happy .month-msg{ color:var(--rose-deep);}

  .sched-layout{ display:block; }
  @media (min-width:900px){
    .sched-layout{ display:grid; grid-template-columns:minmax(300px,420px) 1fr; gap:26px; align-items:start; }
    .sched-cal-col{ position:sticky; top:12px; min-width:0; }
    .sched-list-col{ min-width:0; }
  }

  /* Photocard count pill */
  .pc-count{ font-size:12px; color:var(--ink-soft);}
  .pc-owned{
    display:flex; align-items:center; gap:6px;
    font-size:11px; color:var(--ink); margin:5px 0 6px; cursor:pointer;
  }
  .pc-owned input{ width:13px;height:13px; accent-color:var(--rose-deep); cursor:pointer; flex-shrink:0;}

  /* Photocard 大圖鑑 (series cover) grid — click into a series to see its individual cards */
  .pc-series-grid{
    display:grid; grid-template-columns:repeat(2,1fr); gap:14px;
    align-items:stretch; /* every card in a row stretches to the row's height */
  }
  @media (min-width:460px){ .pc-series-grid{ grid-template-columns:repeat(3,1fr); } }
  @media (min-width:620px){ .pc-series-grid{ grid-template-columns:repeat(4,1fr); } }
  @media (min-width:780px){ .pc-series-grid{ grid-template-columns:repeat(5,1fr); } }
  @media (min-width:940px){ .pc-series-grid{ grid-template-columns:repeat(6,1fr); } }
  @media (min-width:1100px){ .pc-series-grid{ grid-template-columns:repeat(7,1fr); } }
  @media (min-width:1260px){ .pc-series-grid{ grid-template-columns:repeat(8,1fr); } }
  @media (min-width:1400px){ .pc-series-grid{ grid-template-columns:repeat(9,1fr); } }
  .pc-series-card-wrap{
    position:relative;
    height:100%;
    min-width:0;
    display:flex;
    flex-direction:column;
  }
  .pc-series-card{
    background:var(--surface); border-radius:16px; overflow:hidden;
    box-shadow:var(--shadow-sm); cursor:pointer; border:none; padding:0; text-align:left;
    transition:transform 0.15s ease;
    display:flex; flex-direction:column;
    height:100%;
    width:100%;
    min-width:0;
  }
  .pc-series-card:hover{ transform:translateY(-3px); }
  .pc-series-cover{
    width:100%; aspect-ratio:4/5; object-fit:contain; object-position:center top;
    background:var(--sakura-pale); display:block; flex-shrink:0;
  }
  .pc-series-cover.ph{ display:flex; align-items:center; justify-content:center; font-size:32px; color:var(--ink-faint);}
  .pc-series-edit-cover{
    position:absolute; bottom:9px; right:9px; width:26px; height:26px; border-radius:50%;
    border:none; background:rgba(255,255,255,0.92); color:var(--rose-deep); font-size:12px;
    display:flex; align-items:center; justify-content:center; cursor:pointer; box-shadow:var(--shadow-sm);
    z-index:2;
  }
  .pc-series-body{
    padding:9px 34px 11px 11px; position:relative;
    flex:1; display:flex; flex-direction:column; justify-content:center;
    min-height:44px;
  }
  .pc-series-name{
    font-weight:700; font-size:12.5px; white-space:normal; overflow-wrap:break-word; line-height:1.35;
  }
  .pc-series-count{ font-size:11px; color:var(--ink-soft); margin-top:1px;}

  .pc-back{
    display:inline-flex; align-items:center; gap:6px; cursor:pointer;
    color:var(--rose-deep); font-weight:700; font-size:13.5px; margin:0 2px 14px; user-select:none;
  }

  /* Individual photocard grid — auto-adjusts by device width, capped at 8 columns */
  .pc-grid{
    display:grid; grid-template-columns:repeat(2,1fr); gap:8px;
    align-items:stretch;
  }
  @media (min-width:380px){ .pc-grid{ grid-template-columns:repeat(3,1fr); } }
  @media (min-width:480px){ .pc-grid{ grid-template-columns:repeat(4,1fr); gap:9px; } }
  @media (min-width:620px){ .pc-grid{ grid-template-columns:repeat(5,1fr); } }
  @media (min-width:760px){ .pc-grid{ grid-template-columns:repeat(6,1fr); gap:10px; } }
  @media (min-width:900px){ .pc-grid{ grid-template-columns:repeat(7,1fr); } }
  @media (min-width:1040px){ .pc-grid{ grid-template-columns:repeat(8,1fr); } }
  @media (min-width:1180px){ .pc-grid{ grid-template-columns:repeat(9,1fr); } }
  .pc-card{
    background:var(--surface); border-radius:14px; overflow:hidden;
    box-shadow:var(--shadow-sm); position:relative; display:flex; flex-direction:column;
    height:100%;
  }
  .pc-img{
    width:100%; aspect-ratio: 4/5; object-fit:contain; background:var(--sakura-pale);
    display:block;
  }
  .pc-img.ph{ display:flex; align-items:center; justify-content:center; font-size:26px; color:var(--ink-faint);}
  .pc-body{ padding:8px 8px 8px; flex:1; display:flex; flex-direction:column;}
  .pc-name{ font-weight:700; font-size:11.5px; margin:0 0 2px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  .pc-sub{ font-size:10px; color:var(--ink-soft); margin-bottom:4px; white-space:nowrap; overflow:hidden; text-overflow:ellipsis;}
  /* edit / delete buttons anchored to the bottom-right corner of each card */
  .pc-actions{ display:flex; justify-content:flex-end; gap:4px; margin-top:auto; padding-top:6px;}
  .pc-actions .icon-btn{ width:22px;height:22px; font-size:10px;}

  /* 應援牆 (support wall) gallery */
  .support-grid{ display:grid; grid-template-columns:repeat(2,1fr); gap:12px; }
  @media (min-width:480px){ .support-grid{ grid-template-columns:repeat(3,1fr); } }
  @media (min-width:680px){ .support-grid{ grid-template-columns:repeat(4,1fr); gap:14px; } }
  @media (min-width:920px){ .support-grid{ grid-template-columns:repeat(5,1fr); } }
  @media (min-width:1160px){ .support-grid{ grid-template-columns:repeat(6,1fr); } }
  .support-card{ padding:0; overflow:hidden; display:flex; flex-direction:column; }
  .support-cover{ width:100%; aspect-ratio:4/3; object-fit:contain; background:var(--sakura-pale); display:block; }
  .support-cover.ph{ display:flex; align-items:center; justify-content:center; font-size:32px; color:var(--ink-faint); }
  .support-body{ padding:14px 16px 16px; }

  /* Floating add button */
  .fab{
    position:fixed;
    bottom:96px;
    right:20px;
    width:54px;height:54px;border-radius:50%;
    background:var(--rose-deep);
    color:#fff; border:none;
    font-size:24px;
    box-shadow:0 8px 18px rgba(42,143,199,0.35);
    cursor:pointer;
    display:flex;align-items:center;justify-content:center;
    z-index:20;
  }

  /* Bottom nav (becomes a left sidebar at >=900px, see breakpoint above) */
  nav.bottom{
    position:fixed; bottom:0; left:0;
    width:100%; max-width:100%;
    background:var(--surface);
    border-top:1px solid var(--sakura-pale);
    display:flex; justify-content:center; gap:2px;
    padding:8px 4px calc(8px + env(safe-area-inset-bottom));
    z-index:15;
    box-shadow: 0 -6px 20px rgba(42,143,199,0.08);
  }
  nav.bottom .nav-btn{ max-width:110px; }
  .nav-btn{

const LOCAL_PREFIX = 'oshiapp:';

async function loadKey(key, fallback){
  if(useCloud && currentUser){
    try{
      const docRef = db.collection('users').doc(currentUser.uid).collection('data').doc(key);
      const doc = await docRef.get();
      if(doc.exists && doc.data().value !== undefined){
        return doc.data().value;
      }
      return fallback;
    }catch(e){
      console.error("雲端讀取失敗", e);
      return fallback;
    }
  } else {
    try{
      const raw = window.localStorage.getItem(LOCAL_PREFIX+key);
      return raw ? JSON.parse(raw) : fallback;
    }catch(e){ return fallback; }
  }
}

async function saveKey(key, value){
  if(useCloud && currentUser){
    try{
      const docRef = db.collection('users').doc(currentUser.uid).collection('data').doc(key);
      await docRef.set({ value: value });
    }catch(e){
      showToast('雲端儲存失敗，請檢查網路連線');
      console.error(e);
    }
    return;
  } else {
    try{
      window.localStorage.setItem(LOCAL_PREFIX+key, JSON.stringify(value));
    }catch(e){
      showToast('瀏覽器儲存空間可能已滿');
      console.error(e);

    return;
  }

const TAG_CLASSES = ['', 'matcha', 'wisteria', 'gold', 'rose', 'sky', 'peach', 'lavender', 'mint', 'coral', 'amber', 'slate'];
function tagColorClass(text, categoryList){
  if(!text) return '';
  if(categoryList && categoryList.length){
    const idx = categoryList.indexOf(text);
    if(idx>=0) return TAG_CLASSES[idx % TAG_CLASSES.length];
  }
  // 找不到所屬清單時（例如舊資料），退回用文字雜湊決定顏色，至少同一個名稱顏色穩定
  let h = 0;
  for(let i=0;i<text.length;i++) h = (h*31 + text.charCodeAt(i)) % 997;
  return TAG_CLASSES[h % TAG_CLASSES.length];
}

/* Richer pastel palette for category "chip" filter buttons (e.g. expense categories) */
const CHIP_PALETTE = [
  {bg:'#FDE0E8', fg:'#B23A5C'},
  {bg:'#E4D9FF', fg:'#5B3FA0'},
  {bg:'#FFF3C4', fg:'#8A6A28'},
  {bg:'#D8F3DC', fg:'#2F6B3F'},
  {bg:'#FBD9F0', fg:'#9C3D82'},
  {bg:'#D9EEFB', fg:'#2A6F99'},
  {bg:'#FFE3C2', fg:'#9C5A17'},
  {bg:'#E0D4F7', fg:'#5A3E85'},
  {bg:'#DCEEFA', fg:'#2A6F99'},
  {bg:'#E6E6E6', fg:'#555555'}
];
function chipColor(text){
  if(!text) return CHIP_PALETTE[CHIP_PALETTE.length-1];
  let h = 0;
  for(let i=0;i<text.length;i++) h = (h*31 + text.charCodeAt(i)) % 997;
  return CHIP_PALETTE[h % CHIP_PALETTE.length];
}

/* ================= Init & Auth ================= */
function readLocalRaw(key, fallback){
  try{
    const raw = window.localStorage.getItem(LOCAL_PREFIX+key);
    return raw ? JSON.parse(raw) : fallback;
  }catch(e){ return fallback; }
}
function hasRealData(vals){
  return vals.some(v=>{
    if(Array.isArray(v)) return v.length>0;
    if(v && typeof v==='object') return !!v.nickname;
    return false;
  });
}

async function migrateLocalDataToCloudIfNeeded(){
  if(!useCloud || !currentUser) return;
  try{
    const [cSc, cEx, cPc, cMv, cFl, cAr, cPf] = await Promise.all([
      loadKey('oshi-schedule', []), loadKey('oshi-expense', []), loadKey('oshi-photocards', []),
      loadKey('oshi-support', []), loadKey('oshi-fanlog', []), loadKey('oshi-artists', []),
      loadKey('oshi-profile', {nickname:''})
    ]);
    if(hasRealData([cSc,cEx,cPc,cMv,cFl,cAr,cPf])) return;

    const lSc = readLocalRaw('oshi-schedule', []);
    const lEx = readLocalRaw('oshi-expense', []);
    const lPc = readLocalRaw('oshi-photocards', []);
    const lMv = readLocalRaw('oshi-support', []);
    const lFl = readLocalRaw('oshi-fanlog', []);
    const lAr = readLocalRaw('oshi-artists', []);
    const lPf = readLocalRaw('oshi-profile', {nickname:''});
    const lCc = readLocalRaw('oshi-pc-categories', []);
    const lFlc = readLocalRaw('oshi-fanlog-categories', []);
    const lScc = readLocalRaw('oshi-schedule-categories', []);
    if(!hasRealData([lSc,lEx,lPc,lMv,lFl,lAr,lPf])) return;

    await Promise.all([
      saveKey('oshi-schedule', lSc), saveKey('oshi-expense', lEx), saveKey('oshi-photocards', lPc),
      saveKey('oshi-support', lMv), saveKey('oshi-fanlog', lFl), saveKey('oshi-artists', lAr),
      saveKey('oshi-profile', lPf), saveKey('oshi-pc-categories', lCc), saveKey('oshi-fanlog-categories', lFlc),
      saveKey('oshi-schedule-categories', lScc)
    ]);
    showToast('已將本機資料同步到雲端帳號 ☁️');
  }catch(e){
    console.error('本機資料搬遷至雲端失敗', e);
  }
}

async function loadAllData(){
  const [sc, ex, pc, mv, fl, ar, pf, cc, pcc, pcm, flc, scc, en, mg, mo, enc] = await Promise.all([
    loadKey('oshi-schedule', []),
    loadKey('oshi-expense', []),
    loadKey('oshi-photocards', []),
    loadKey('oshi-support', []),
    loadKey('oshi-fanlog', []),
    loadKey('oshi-artists', []),
    loadKey('oshi-profile', {nickname:''}),
    loadKey('oshi-pc-categories', []),
    loadKey('oshi-pc-covers', {}),
    loadKey('oshi-pc-series-meta', {}),
    loadKey('oshi-fanlog-categories', []),
    loadKey('oshi-schedule-categories', []),
    loadKey('oshi-endorsement', []),
    loadKey('oshi-magazine', []),
    loadKey('oshi-movie', []),
    loadKey('oshi-endorsement-categories', [])
  ]);
  state.schedule = sc; state.expense = ex; state.photocards = pc;
  state.support = mv; state.fanlog = fl; state.artists = ar; state.profile = pf;
  state.customPcCategories = cc;
  state.pcSeriesCovers = pcc || {};
  state.pcSeriesMeta = pcm || {};
  state.customFanlogCategories = flc;
  state.customScheduleCategories = scc;
  state.endorsement = en;
  state.magazine = mg;
  state.movie = mo;
  state.customEndorsementCategories = enc;
}

async function init(){
  if(useCloud && auth){
    auth.onAuthStateChanged(async (user)=>{
      currentUser = user;
      if(user){ await migrateLocalDataToCloudIfNeeded(); }
      await loadAllData();
      document.getElementById('loadingScreen').style.display='none';
      updateStorageBanner();
      renderProfile();
      render();
    });
  } else {
    await loadAllData();
    document.getElementById('loadingScreen').style.display='none';
    updateStorageBanner();
    renderProfile();
    render();
  }
  spawnPetals();
  bindNav();
}

function renderProfile(){
  const label = currentUser ? (currentUser.displayName || '已登入雲端') : (state.profile.nickname ? state.profile.nickname : '登入 / 設定');
  document.getElementById('profileLabel').textContent = label;
  document.getElementById('headerSub').textContent = state.profile.nickname ? state.profile.nickname + ' 的追星手帳' : '我的追星手帳';
}

function updateStorageBanner(){
  const el = document.getElementById('storageWarning');
  if(el) el.style.display = 'none';
}

function spawnPetals(){
  const host = document.getElementById('petalHost');
  for(let i=0;i<5;i++){
    const p = document.createElement('div');
    p.className='petal';
    p.style.left = (10+i*20)+'%';
    p.style.animationDuration = (5+Math.random()*4)+'s';
    p.style.animationDelay = (Math.random()*4)+'s';
    host.appendChild(p);
  }
}

/* ================= Nav ================= */
function bindNav(){
  document.querySelectorAll('.nav-btn').forEach(btn=>{
    btn.addEventListener('click', ()=>{
      state.tab = btn.dataset.tab;
      render();
    });
  });
  document.getElementById('fabAdd').addEventListener('click', ()=>{
    if(state.tab==='home'){ state.tab='schedule'; render(); }
    if(state.tab==='photocards'){ openPhotocardForm(null); return; }
    if(state.tab==='expense'){ openExpenseForm(null); return; }
    if(state.tab==='fanlog'){ openFanlogForm(null); return; }
    if(state.tab==='schedule'){ openScheduleForm(null); return; }
    if(state.tab==='support'){ openSupportForm(null); return; }
    if(state.tab==='media'){
      if(mediaSubTab==='endorsement'){ openEndorsementForm(null); }
      else if(mediaSubTab==='magazine'){ openMagazineForm(null); }
      else { openMovieForm(null); }
      return;
    }
    openForm(state.tab, null);
  });
  document.getElementById('profileChip').addEventListener('click', openProfileForm);
  document.getElementById('storageWarningClose').addEventListener('click', ()=>{
    document.getElementById('storageWarning').style.display = 'none';
  });
  document.getElementById('overlay').addEventListener('click', (e)=>{
    if(e.target.id==='overlay') closeModal();
  });
}

function updateNavActive(){
  document.querySelectorAll('.nav-btn').forEach(b=>{
    b.classList.toggle('active', b.dataset.tab===state.tab);
  });
  document.getElementById('fabAdd').style.display = state.tab==='home' ? 'none' : 'flex';
}

/* ================= Render dispatcher ================= */
function render(){
  updateNavActive();
  const main = document.getElementById('mainContent');
  if(state.tab==='home'){ main.innerHTML = renderHome(); bindHomeLinks(); return; }
  if(state.tab==='schedule'){ main.innerHTML = renderScheduleTab(); bindCalendarActions(); return; }
  if(state.tab==='fanlog'){ main.innerHTML = renderFanlogTab(); bindListActions('fanlog'); bindFanlogReviewActions(); return; }
  if(state.tab==='photocards'){ main.innerHTML = renderPhotocards(); bindListActions('photocards'); return; }
  if(state.tab==='expense'){ main.innerHTML = renderExpenseTab(); bindListActions('expense'); bindExpenseActions(); return; }
  if(state.tab==='artists'){ main.innerHTML = renderArtists(); bindListActions('artists'); bindArtistCardActions(); return; }
  if(state.tab==='support'){ main.innerHTML = renderSupportTab(); bindListActions('support'); bindSupportFilterActions(); return; }
  if(state.tab==='media'){ main.innerHTML = renderMediaTab(); bindListActions('media'); bindMediaTabActions(); return; }
  main.innerHTML = renderGenericList(state.tab);
  bindListActions(state.tab);
}

function esc(s){
  if(s===undefined||s===null) return '';
  return String(s).replace(/[&<>"']/g, c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
}
function fmtDate(d){
  if(!d) return '';
  const parts = d.split('-');
  if(parts.length!==3) return d;
  return `${parts[0]}/${parts[1]}/${parts[2]}`;
}
function todayStr(){
  const t = new Date();
  return t.toISOString().slice(0,10);
}

function bindHomeLinks(){
  document.querySelectorAll('[data-goto]').forEach(a=>{

  });
}

/* ================= Generic list ================= */
function renderGenericList(tab){
  const meta = TAB_META[tab];
  const items = [...state[tab]];
  items.sort((a,b)=> (b.date||'').localeCompare(a.date||''));

  let html = `<div class="section-title"><div class="stamp maru">${meta.stamp}</div>${meta.label}</div>`;

  if(items.length===0){
    html += `<div class="empty"><div class="big">${meta.emptyIcon}</div><div class="msg">${meta.empty}<br>點右下角的「＋」新增一筆吧</div></div>`;
    return html;
  }

  html += `<div class="list-grid">`;
  items.forEach(item=>{
    html += renderCard(tab, item);
  });
  html += `</div>`;
  return html;
}

function renderCard(tab, item){
  const schema = SCHEMAS[tab];
  const titleKey = schema.find(f=>f.required && f.type==='text') ? schema.find(f=>f.required && f.type==='text').key : schema[0].key;
  let title = item[titleKey] || '（未命名）';
  let metaLine = '';
  let tags = '';

  if(tab==='schedule'){
    const dateLabel = (item.isMultiDay && item.endDate && item.endDate!==item.date)
      ? `${fmtDate(item.date)} ～ ${fmtDate(item.endDate)}`
      : fmtDate(item.date);
    metaLine = [dateLabel, item.location].filter(Boolean).join(' · ');
    if(item.artist) tags += `<span class="tag">${esc(item.artist)}</span>`;
    if(item.category) tags += `<span class="tag matcha">${esc(item.category)}</span>`;
  } else if(tab==='expense'){
    metaLine = fmtDate(item.date);
    tags += `<span class="tag gold">NT$ ${(parseFloat(item.amount)||0).toLocaleString()}</span>`;
    if(item.category) tags += `<span class="tag">${esc(item.category)}</span>`;
  } else if(tab==='fanlog'){
    metaLine = fmtDate(item.date);
    if(item.artist) tags += `<span class="tag">${esc(item.artist)}</span>`;
    if(item.category) tags += `<span class="tag ${tagColorClass(item.category, [...FIXED_FANLOG_CATEGORIES, ...state.customFanlogCategories])}">${esc(item.category)}</span>`;
  }

  return `
  <div class="card">
    <div class="card-row">
      <div>
        <div class="card-title">${esc(title)}</div>
        <div class="card-meta">${esc(metaLine)}</div>
        <div>${tags}</div>
        ${item.note ? `<div class="card-meta" style="margin-top:6px;">${esc(item.note)}</div>` : ''}
      </div>
      <div class="card-actions">
        <button class="icon-btn edit" data-tab="${tab}" data-id="${item.id}">✎</button>
        <button class="icon-btn del" data-tab="${tab}" data-id="${item.id}">🗑</button>
      </div>
    </div>
  </div>`;
}

/* ================= Expense (記帳本) ================= */
function renderExpenseTab(){
  const meta = TAB_META.expense;
  let html = `<div class="section-title"><div class="stamp maru">${meta.stamp}</div>${meta.label}</div>`;

  const items = [...state.expense].sort((a,b)=> (b.date||'').localeCompare(a.date||''));
  if(items.length===0){
    html += `<div class="empty"><div class="big">${meta.emptyIcon}</div><div class="msg">${meta.empty}<br>點右下角的「＋」記一筆吧</div></div>`;
    return html;
  }

  const grandTotal = items.reduce((sum, e) => sum + expenseAmount(e), 0);

  // 切換按鈕（累積消費總計僅在「全部明細」顯示，分類明細/歷年花費各自已有小計，不重複列出總計）
  html += `
  <div class="cal-filter-row" style="margin-bottom:14px;">
    <button class="exp-view-btn cal-filter-btn ${expViewMode==='all'?'active':''}" data-view="all">📋 全部明細</button>
    <button class="exp-view-btn cal-filter-btn ${expViewMode==='category'?'active':''}" data-view="category">🏷️ 分類明細</button>
    <button class="exp-view-btn cal-filter-btn ${expViewMode==='year'?'active':''}" data-view="year">📅 歷年花費</button>
  </div>
  `;
  if(expViewMode==='all'){
    // 依有紀錄的月份列出可篩選的月份（新到舊）
    const months = [...new Set(items.filter(e=>e.date).map(e=>e.date.slice(0,7)))].sort((a,b)=> b.localeCompare(a));
    if(expMonthFilter!=='__all__' && !months.includes(expMonthFilter)) expMonthFilter = '__all__';

    html += `<div class="cal-filter-row" style="margin-bottom:14px;">
      <button class="chip-filter-btn cal-filter-btn ${expMonthFilter==='__all__'?'active':''}" data-month="__all__">📆 全部</button>
      ${months.map(m=>{
        const [y,mm] = m.split('-');
        const active = expMonthFilter===m;
        return `<button class="chip-filter-btn cal-filter-btn ${active?'active':''}" data-month="${m}">${y}/${parseInt(mm,10)}月</button>`;
      }).join('')}
    </div>`;

    // 累積消費總計：放在篩選列下方、月份明細上方
    html += `
    <div class="mini-row" style="margin-bottom:16px; background:var(--surface); border-radius:14px; padding:12px 16px; box-shadow:var(--shadow-sm);">
      <span class="l" style="font-weight:700;">💰 累積消費總計</span>
      <span class="r" style="font-weight:700; font-size:16px; color:var(--rose-deep);">NT$ ${grandTotal.toLocaleString()}</span>
    </div>
    `;

    // 選擇特定月份時，顯示該月明細
    if(expMonthFilter!=='__all__'){
      const monthItems = items.filter(e=> e.date && e.date.startsWith(expMonthFilter));
      const monthTotal = monthItems.reduce((sum,e)=> sum + expenseAmount(e), 0);
      const [my, mm] = expMonthFilter.split('-');

      html += `
      <div class="exp-group-header">
        <div class="exp-group-title">🗓️ ${my}/${parseInt(mm,10)}月明細 <span class="exp-group-count">(${monthItems.length} 筆)</span></div>
        <div class="exp-group-meta">NT$ ${monthTotal.toLocaleString()}</div>
      </div>
      <div class="exp-grid">
      `;
      if(monthItems.length===0){
        html += `<div class="empty"><div class="big">${meta.emptyIcon}</div><div class="msg">這個月還沒有花費紀錄</div></div>`;
      } else {
        monthItems.forEach(item=>{ html += renderExpenseCard(item); });
      }
      html += `</div>`;
    }
  }

  if(expViewMode==='all'){
    if(expMonthFilter==='__all__'){
      html += `<div class="exp-grid">`;
      items.forEach(item=>{ html += renderExpenseCard(item); });
      html += `</div>`;
    }
  } else if(expViewMode==='category'){
    // 依分類分組
    const catGroups = {};
    items.forEach(item=>{
      const cat = item.category || '未分類';
      if(!catGroups[cat]) catGroups[cat] = [];
      catGroups[cat].push(item);
    });

    const categoryKeys = Object.keys(catGroups).sort((a,b)=>{
      const idxA = EXPENSE_CATEGORIES.indexOf(a);
      const idxB = EXPENSE_CATEGORIES.indexOf(b);
      if(idxA !== -1 && idxB !== -1) return idxA - idxB;
      if(idxA !== -1) return -1;
      if(idxB !== -1) return 1;
      return a.localeCompare(b);
    });

    if(expCategoryFilter!=='__all__' && !categoryKeys.includes(expCategoryFilter)) expCategoryFilter = '__all__';

    html += `<div class="cal-filter-row" style="margin-bottom:14px;">
      <button class="chip-filter-btn cal-filter-btn ${expCategoryFilter==='__all__'?'active':''}" data-cat="__all__">全部類別</button>
      ${categoryKeys.map(cat=>{
        const c = chipColor(cat);
        const icon = EXPENSE_CATEGORY_ICON[cat] || '🏷️';
        const active = expCategoryFilter===cat;
        return `<button class="chip-filter-btn ${active?'active':''}" style="background:${c.bg};color:${c.fg};" data-cat="${esc(cat)}">${icon} ${esc(cat)}</button>`;
      }).join('')}
    </div>`;

    const catItems = expCategoryFilter==='__all__' ? items : catGroups[expCategoryFilter];
    const catTotal = catItems.reduce((sum, e) => sum + expenseAmount(e), 0);
    const catLabel = expCategoryFilter==='__all__' ? '全部類別' : expCategoryFilter;

    html += `
    <div class="exp-group-header">
      <div class="exp-group-title">${catLabel} <span class="exp-group-count">(${catItems.length} 筆)</span></div>
      <div class="exp-group-meta">NT$ ${catTotal.toLocaleString()}</div>
    </div>
    <div class="exp-grid">
    `;
    catItems.forEach(item=>{ html += renderExpenseCard(item); });
    html += `</div>`;
  } else if(expViewMode==='year'){
    // 依年份分組
    const yearGroups = {};
    items.forEach(item=>{
      const y = (item.date && item.date.length >= 4) ? item.date.slice(0,4) : '未知年份';
      if(!yearGroups[y]) yearGroups[y] = [];
      yearGroups[y].push(item);
    });

    // 年份由新到舊排序
    const yearKeys = Object.keys(yearGroups).sort((a,b)=> b.localeCompare(a));

    if(expYearFilter!=='__all__' && !yearKeys.includes(expYearFilter)) expYearFilter = yearKeys[0] || '__all__';

    html += `<div class="cal-filter-row" style="margin-bottom:14px;">
      <button class="chip-filter-btn cal-filter-btn ${expYearFilter==='__all__'?'active':''}" data-year="__all__">全部年份</button>
      ${yearKeys.map(y=>`<button class="chip-filter-btn cal-filter-btn ${expYearFilter===y?'active':''}" data-year="${esc(y)}">${esc(y)} 年</button>`).join('')}
    </div>`;

    const yearItems = expYearFilter==='__all__' ? items : yearGroups[expYearFilter];
    const yearTotal = yearItems.reduce((sum, e) => sum + expenseAmount(e), 0);
    const yearLabel = expYearFilter==='__all__' ? '全部年份' : `${expYearFilter} 年`;

    html += `

/* ================= Schedule (calendar view) ================= */
let calMonth = null;
let scheduleArtistFilter = '__all__';

function ensureCalMonth(){
  if(!calMonth) calMonth = todayStr().slice(0,7);
}

function eventColorClass(key){
  if(!key) return 'ec0';
  let h = 0;
  for(let i=0;i<key.length;i++) h = (h*31 + key.charCodeAt(i)) % 997;
  return 'ec' + (h % 5);
}

function renderScheduleTab(){
  ensureCalMonth();
  const meta = TAB_META.schedule;
  let html = `<div class="section-title"><div class="stamp maru">${meta.stamp}</div>${meta.label}</div>`;

  const artistNames = [...new Set(state.schedule.map(s=>s.artist).filter(Boolean))];

  const [y,m] = calMonth.split('-').map(Number);
  const firstDay = new Date(y, m-1, 1);
  const startWeekday = firstDay.getDay();
  const daysInMonth = new Date(y, m, 0).getDate();
  const monthLabel = `${y}年${m}月`;

  const filteredSchedule = state.schedule.filter(s=> scheduleArtistFilter==='__all__' || s.artist===scheduleArtistFilter);
  const eventsByDate = {};
  filteredSchedule.forEach(s=>{
    if(!s.date) return;
    if(s.isMultiDay && s.endDate && s.endDate > s.date){
      let cur = new Date(s.date+'T00:00:00');
      const end = new Date(s.endDate+'T00:00:00');
      let guard = 0;
      while(cur <= end && guard < 366){
        const ds = `${cur.getFullYear()}-${String(cur.getMonth()+1).padStart(2,'0')}-${String(cur.getDate()).padStart(2,'0')}`;
        (eventsByDate[ds] = eventsByDate[ds] || []).push(s);
        cur.setDate(cur.getDate()+1);
        guard++;
      }
    } else {
      (eventsByDate[s.date] = eventsByDate[s.date] || []).push(s);
    }
  });

  html += `<div class="cal-filter-row">
    <button class="cal-filter-btn ${scheduleArtistFilter==='__all__'?'active':''}" data-filter="__all__">全部行程</button>
    ${artistNames.map(n=>`<button class="cal-filter-btn ${scheduleArtistFilter===n?'active':''}" data-filter="${esc(n)}">${esc(n)}</button>`).join('')}
  </div>`;

  html += `<div class="cal-head">
    <button class="cal-nav-btn" data-nav="-1">‹</button>
    <div class="cal-title maru">${monthLabel}</div>
    <button class="cal-nav-btn" data-nav="1">›</button>
  </div>`;

  const dows = ['日','一','二','三','四','五','六'];
  html += `<div class="cal-grid">`;
  dows.forEach(d=> html += `<div class="cal-dow">${d}</div>`);
  for(let i=0;i<startWeekday;i++) html += `<div class="cal-day empty"></div>`;
  const today = todayStr();
  const MAX_PILLS = 3;
  for(let d=1; d<=daysInMonth; d++){
    const dateStr = `${y}-${String(m).padStart(2,'0')}-${String(d).padStart(2,'0')}`;
    const isToday = dateStr===today;
    const dayEvents = eventsByDate[dateStr] || [];
    const shown = dayEvents.slice(0, MAX_PILLS);
    const extra = dayEvents.length - shown.length;
    html += `<div class="cal-day ${isToday?'today':''}" data-date="${dateStr}">
      <span class="daynum">${d}</span>
      ${shown.map(ev=>`<span class="event-pill ${eventColorClass(ev.artist||ev.title)}" data-id="${ev.id}" title="${esc(ev.title)}">${esc(ev.title)}</span>`).join('')}
      ${extra>0 ? `<span class="event-more">+${extra} 更多</span>` : ''}
    </div>`;
  }
  html += `</div>`;
  return html;
}

function bindCalendarActions(){
  document.querySelectorAll('.cal-filter-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      scheduleArtistFilter = b.dataset.filter;
      render();
    });
  });
  document.querySelectorAll('.cal-nav-btn').forEach(b=>{
    b.addEventListener('click', ()=>{
      const [y,m] = calMonth.split('-').map(Number);
      const dir = parseInt(b.dataset.nav,10);
      let newM = m+dir, newY = y;
      if(newM<1){ newM=12; newY--; }
      if(newM>12){ newM=1; newY++; }
      calMonth = `${newY}-${String(newM).padStart(2,'0')}`;
      render();
    });
  });
  document.querySelectorAll('.event-pill').forEach(p=>{
    p.addEventListener('click', (e)=>{
      e.stopPropagation();
      openScheduleForm(p.dataset.id);
    });
  });
  document.querySelectorAll('.cal-day:not(.empty)').forEach(d=>{
    d.addEventListener('click', ()=>{
      openScheduleForm(null, { date: d.dataset.date });
    });
  });
}

/* ================= Photocards ================= */
let pcDrill = null;
let pcArtistFilter = '__all__';

function pcGroupKey(pc){
  return (pc.series && pc.series.trim()) || (pc.artist && pc.artist.trim()) || '未分類';
}
function pcGroups(){
  const groups = {};
  state.photocards
    .filter(pc=> pcArtistFilter==='__all__' || pc.artist===pcArtistFilter)
    .forEach(pc=>{
      const key = pcGroupKey(pc);
      (groups[key] = groups[key] || []).push(pc);
    });
  // 圖鑑內以建立時間排序，越靠近今天排越前面
  Object.keys(groups).forEach(key=>{
    groups[key].sort((a,b)=> (b.createdAt||'').localeCompare(a.createdAt||''));
  });
  return groups;
}
function pcSeriesCreatedAt(key){
  return (state.pcSeriesMeta && state.pcSeriesMeta[key] && state.pcSeriesMeta[key].createdAt) || '';
}
function pcOrderedKeys(groups){
  const preferredOrder = [...state.artists.map(a=>a.name)];
  const allKeys = Object.keys(groups);
  const seriesKeys = allKeys.filter(k=>!preferredOrder.includes(k) && k!=='未分類');
  // 圖鑑本身有自己獨立的建立日期（跟裡面小卡的建立日期分開），有設定日期的排前面、越新越前面
  seriesKeys.sort((a,b)=>{
    const da = pcSeriesCreatedAt(a), db = pcSeriesCreatedAt(b);
    if(da && db) return db.localeCompare(da);
    if(da && !db) return -1;
    if(!da && db) return 1;
    return a.localeCompare(b);
  });
  const ordered = [
    ...preferredOrder.filter(k=>groups[k]),
    ...seriesKeys,
  ];
  if(groups['未分類']) ordered.push('未分類');
  return ordered;
}

function renderPhotocards(){
  const meta = TAB_META.photocards;
  let html = `<div class="section-title"><div class="stamp maru">${meta.stamp}</div>${meta.label}</div>`;
  if(state.photocards.length===0){
    html += `<div class="empty"><div class="big">${meta.emptyIcon}</div><div class="msg">${meta.empty}<br>點右下角的「＋」新增一張吧</div></div>`;
    return html;
  }

  const artistNames = [...new Set(state.photocards.map(p=>p.artist).filter(Boolean))];
  html += `<div class="cal-filter-row">
    <button class="cal-filter-btn ${pcArtistFilter==='__all__'?'active':''}" data-filter="__all__">全部藝人</button>
    ${artistNames.map(n=>`<button class="cal-filter-btn ${pcArtistFilter===n?'active':''}" data-filter="${esc(n)}">${esc(n)}</button>`).join('')}
  </div>`;

  const groups = pcGroups();

  if(pcDrill && !groups[pcDrill]) pcDrill = null;

  if(pcDrill){
    const items = groups[pcDrill];
    html += `<div class="pc-back" data-back="1">← 返回圖鑑</div>`;
    html += `<div class="card-title" style="margin:0 2px 12px;font-size:16px;">${esc(pcDrill)} <span class="pc-count">(${items.length})</span></div>`;
    html += `<div class="pc-grid">`;
    items.forEach(pc=>{ html += renderPhotocardCard(pc); });
    html += `</div>`;
    return html;
  }

  const ordered = pcOrderedKeys(groups);
  html += `<div class="pc-series-grid">`;
  ordered.forEach(key=>{
    const items = groups[key];
    const manualCover = state.pcSeriesCovers && state.pcSeriesCovers[key];
    const autoCover = items.find(i=>i.imageUrl);
    const coverUrl = manualCover || (autoCover ? autoCover.imageUrl : '');
    html += `
    <div class="pc-series-card-wrap">
      <button class="pc-series-card" data-series="${esc(key)}">
        ${coverUrl ? `<img class="pc-series-cover" src="${esc(coverUrl)}" onerror="this.outerHTML='<div class=&quot;pc-series-cover ph&quot;>🎴</div>'">`
                : `<div class="pc-series-cover ph">🎴</div>`}
        <div class="pc-series-body">
          <div class="pc-series-name">${esc(key)}</div>

let supportArtistFilter = '__all__';
let supportYearFilter = '__all__';
let endorsementArtistFilter = '__all__';
let magazineArtistFilter = '__all__';
let movieArtistFilter = '__all__';
let mediaSubTab = 'endorsement';

function renderSupportTab(){
  const meta = TAB_META.support;
  let html = `<div class="section-title"><div class="stamp maru">${meta.stamp}</div>${meta.label}</div>`;
  if(state.support.length===0){
    html += `<div class="empty"><div class="big">${meta.emptyIcon}</div><div class="msg">${meta.empty}<br>點右下角的「＋」放上你的應援吧</div></div>`;
    return html;
  }

  const artistNames = [...new Set(state.support.map(s=>s.artist).filter(Boolean))];
  if(artistNames.length>0){
    html += `<div class="cal-filter-row">
      <button class="cal-filter-btn ${supportArtistFilter==='__all__'?'active':''}" data-filter="__all__">全部藝人</button>
      ${artistNames.map(n=>`<button class="cal-filter-btn ${supportArtistFilter===n?'active':''}" data-filter="${esc(n)}">${esc(n)}</button>`).join('')}
    </div>`;
  }
  if(supportArtistFilter!=='__all__' && !artistNames.includes(supportArtistFilter)) supportArtistFilter = '__all__';

  const years = [...new Set(state.support.map(s=> s.date ? s.date.slice(0,4) : null).filter(Boolean))].sort((a,b)=> b.localeCompare(a));
  if(supportYearFilter!=='__all__' && !years.includes(supportYearFilter)) supportYearFilter = '__all__';
  if(years.length>0){
    html += `<div class="cal-filter-row" style="margin-top:8px;">
      <button class="cal-filter-btn year-filter-btn ${supportYearFilter==='__all__'?'active':''}" data-year="__all__">全部年份</button>
      ${years.map(y=>`<button class="cal-filter-btn year-filter-btn ${supportYearFilter===y?'active':''}" data-year="${y}">${y}</button>`).join('')}
    </div>`;
  }

  const today = todayStr();
  const effectiveEnd = s=> (s.isMultiDay && s.endDate) ? s.endDate : s.date;
  const bySupportArtist = s=> supportArtistFilter==='__all__' || s.artist===supportArtistFilter;
  const bySupportYear = s=> supportYearFilter==='__all__' || (s.date && s.date.startsWith(supportYearFilter));
  const upcoming = state.support.filter(s=> bySupportArtist(s) && bySupportYear(s) && effectiveEnd(s) >= today).sort((a,b)=> (a.date||'').localeCompare(b.date||''));
  const past = state.support.filter(s=> bySupportArtist(s) && bySupportYear(s) && effectiveEnd(s) < today).sort((a,b)=> (b.date||'').localeCompare(a.date||''));

  const renderSupportCard = (s, isEnded)=>{
    const dateLabel = (s.isMultiDay && s.endDate && s.endDate!==s.date)
      ? `${fmtDate(s.date)} ～ ${fmtDate(s.endDate)}`
      : fmtDate(s.date);
    return `
    <div class="card support-card">
      ${s.imageUrl
        ? `<img class="support-cover" src="${esc(s.imageUrl)}" onerror="this.outerHTML='<div class=&quot;support-cover ph&quot;>📣</div>'">`
        : `<div class="support-cover ph">📣</div>`}
      <div class="support-body">
        <div class="card-title">${esc(s.title)}</div>
        <div class="card-meta">${[s.artist, s.activity, s.location].filter(Boolean).join(' · ')}</div>
        <div>
          ${dateLabel ? `<span class="tag">${dateLabel}</span>` : ''}
          ${isEnded ? `<span class="tag wisteria">已結束活動</span>` : ''}
          ${s.isPaid ? `<span class="tag gold">💰 付費應援</span>` : ''}
        </div>
        ${s.condition ? `<div class="card-meta" style="margin-top:6px;">🎟️ 領取條件：${esc(s.condition)}</div>` : ''}
        ${s.content ? `<div class="card-meta" style="margin-top:4px;">${esc(s.content)}</div>` : ''}
        ${s.articleUrl ? `<div style="margin-top:6px;"><a href="${esc(s.articleUrl)}" target="_blank" rel="noopener" class="tag" style="text-decoration:none;">🔗 查看文章</a></div>` : ''}
        <div class="card-actions" style="justify-content:flex-end;margin-top:8px;">
          <button class="icon-btn edit" data-tab="support" data-id="${s.id}">✎</button>
          <button class="icon-btn del" data-tab="support" data-id="${s.id}">🗑</button>
        </div>
      </div>
    </div>`;
  };

  if(upcoming.length>0){
    html += `<div class="home-block">
      <div class="block-head"><h3>🎪 即將開始</h3></div>
      <div class="support-grid">${upcoming.map(s=>renderSupportCard(s,false)).join('')}</div>
    </div>`;
  }
  if(past.length>0){
    html += `<div class="home-block">
      <div class="block-head"><h3>✅ 已結束應援</h3></div>
      <div class="support-grid">${past.map(s=>renderSupportCard(s,true)).join('')}</div>
    </div>`;
  }
  return html;
}

async function saveSupportForm(existing){
  const title = document.getElementById('supTitle').value.trim();
  if(!title){ showToast('請填寫應援名稱'); return; }

  const artistSelect = document.getElementById('supArtistSelect');
  let artist = artistSelect ? artistSelect.value : '';
  if(artist==='__new__' || (artistSelect && artistSelect.options.length && artistSelect.value==='__new__')){
    const newName = document.getElementById('supNewArtistName').value.trim();
    artist = newName;
  }
  if(artist && !state.artists.find(a=>a.name===artist)){
    state.artists.push({ id:'id_'+Date.now()+'_'+Math.floor(Math.random()*1000), name:artist });
    await saveKey('oshi-artists', state.artists);
  }

  const isMultiDay = document.getElementById('supMultiDayBtn').classList.contains('active');
  let date, endDate = '';
  if(isMultiDay){
    date = document.getElementById('supStartDate').value.trim();
    endDate = document.getElementById('supEndDate').value.trim();
    if(endDate && date && endDate < date){ showToast('結束日期不能早於開始日期'); return; }
  } else {
    date = document.getElementById('supDate').value.trim();
  }

  const data = {
    title,
    artist,
    activity: document.getElementById('supActivity').value.trim(),
    date,
    isMultiDay: !!isMultiDay,
    endDate: isMultiDay ? endDate : '',
    location: document.getElementById('supLocation').value.trim(),
    condition: document.getElementById('supCondition').value.trim(),
    articleUrl: document.getElementById('supArticleUrl').value.trim(),
    isPaid: document.getElementById('supIsPaid').checked,
    imageUrl: document.getElementById('supImageUrl').value.trim(),
    content: document.getElementById('supContent').value.trim()
  };

  if(existing){
    Object.assign(existing, data);
  } else {
    data.id = 'id_'+Date.now()+'_'+Math.floor(Math.random()*1000);
    state.support.push(data);
  }
  await saveKey('oshi-support', state.support);
  closeModal();
  render();
  showToast(existing? '已更新' : '已新增');
}

/* ================= Modals & Form Handling ================= */
function openForm(tab, id, prefill){
  editingId = id;
  const schema = SCHEMAS[tab];
  const existing = id ? state[tab].find(i=>String(i.id)===String(id)) : null;
  const meta = TAB_META[tab];

  let fieldsHtml = '';
  schema.forEach(f=>{
    const val = existing ? (existing[f.key]||'') : (prefill && prefill[f.key]!==undefined ? prefill[f.key] : '');
    fieldsHtml += `<div class="field"><label>${f.label}${f.required?' *':''}</label>`;
    if(f.type==='textarea'){
      fieldsHtml += `<textarea data-field="${f.key}" placeholder="${f.ph||''}">${esc(val)}</textarea>`;
    } else if(f.type==='select'){
      fieldsHtml += `<select data-field="${f.key}">`;
      fieldsHtml += `<option value="">請選擇</option>`;
      f.options.forEach(op=>{
        fieldsHtml += `<option value="${esc(op)}" ${val===op?'selected':''}>${esc(op)}</option>`;
      });
      fieldsHtml += `</select>`;
    } else {
      fieldsHtml += `<input type="${f.type}" data-field="${f.key}" value="${esc(val)}" placeholder="${f.ph||''}">`;
    }
    fieldsHtml += `</div>`;
  });

  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <h3 class="maru">${existing? '編輯' : '新增'} · ${meta.label}</h3>
    <div id="formFields">${fieldsHtml}</div>
    <div class="modal-actions">
      <button class="btn ghost" id="cancelBtn">取消</button>
      <button class="btn primary" id="saveBtn">儲存</button>
    </div>
  `;
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  document.getElementById('saveBtn').addEventListener('click', ()=> saveForm(tab, schema, existing));
  showModal();
}

async function saveForm(tab, schema, existing){
  const data = {};
  let missingRequired = false;
  schema.forEach(f=>{
    const el = document.querySelector(`[data-field="${f.key}"]`);
    const val = el ? el.value.trim() : '';
    if(f.required && !val) missingRequired = true;
    data[f.key] = val;
  });
  if(missingRequired){
    showToast('請填寫必填欄位 *');
    return;
  }
  if(existing){
    Object.assign(existing, data);
  } else {
    data.id = 'id_'+Date.now()+'_'+Math.floor(Math.random()*1000);
    state[tab].push(data);
  }
  await saveKey('oshi-'+tab, state[tab]);
  closeModal();
  render();
  showToast(existing? '已更新' : '已新增');
}

/* ================= Fanlog tab (年度／月份回顧) ================= */
let fanlogYearFilter = null;
let fanlogMonthFilter = null;
let fanlogArtistFilter = '__all__';

const FANLOG_YEAR_QUALIFY_COUNT = 8;
const FANLOG_MONTH_HAPPY_COUNT = 3;

function renderFanlogTab(){
  const meta = TAB_META.fanlog;
  let html = `<div class="section-title"><div class="stamp maru">${meta.stamp}</div>${meta.label}</div>`;

  const today = todayStr();
  const thisYear = today.slice(0,4);
  const dated = state.fanlog.filter(f=>f.date);

  if(dated.length===0 && !fanlogYearFilter){
    html += `<div class="empty"><div class="big">${meta.emptyIcon}</div><div class="msg">${meta.empty}<br>點右下角的「＋」新增一筆吧</div></div>`;
    return html;
  }

  const years = [...new Set([thisYear, ...dated.map(f=>f.date.slice(0,4))])].sort((a,b)=> b.localeCompare(a));
  if(!fanlogYearFilter || !years.includes(fanlogYearFilter)){
    fanlogYearFilter = years.includes(thisYear) ? thisYear : years[0];
  }
  if(fanlogMonthFilter && !fanlogMonthFilter.startsWith(fanlogYearFilter)) fanlogMonthFilter = null;

  /* ---- 年度回顧 ---- */
  let yearListHtml = years.map(y=>{
    const count = dated.filter(f=>f.date.slice(0,4)===y).length;
    const isThisYear = y===thisYear;
    const qualify = !isThisYear && count>=FANLOG_YEAR_QUALIFY_COUNT;
    const active = y===fanlogYearFilter ? 'active' : '';
    return `<button class="cal-filter-btn year-filter-btn ${qualify?'qualify':''} ${active}" data-year="${y}">${y} · ${count}場</button>`;
  }).join('');

  /* ---- 月份回顧（依所選年度） ---- */
  let monthListHtml = '';
  for(let m=1;m<=12;m++){
    const mm = String(m).padStart(2,'0');
    const ym = `${fanlogYearFilter}-${mm}`;
    const count = dated.filter(f=>f.date.startsWith(ym)).length;
    const happy = count>=FANLOG_MONTH_HAPPY_COUNT;
    const active = ym===fanlogMonthFilter ? 'active' : '';
    monthListHtml += `<div class="month-card ${happy?'happy':''} ${active}" data-ym="${ym}">
      <div class="month-num maru">${fanlogYearFilter}/${m}月</div>
      <div class="month-count">本月參加：${count}場</div>
    </div>`;
  }

  const reviewHtml = `
    <div class="review-block">
      <div class="review-head maru">📆 年度回顧</div>
      <div class="cal-filter-row" style="margin:0 2px;">${yearListHtml}</div>
    </div>
    <div class="review-block">
      <div class="review-head maru">🗓️ 月份回顧</div>
      <div class="month-grid">${monthListHtml}</div>
    </div>`;

  /* ---- 詳細內容（右側列表） ---- */
  let filtered = dated.filter(f=>f.date.startsWith(fanlogMonthFilter || fanlogYearFilter));

  const artistNames = [...new Set(filtered.map(f=>f.artist).filter(Boolean))];
  if(fanlogArtistFilter!=='__all__' && !artistNames.includes(fanlogArtistFilter)) fanlogArtistFilter = '__all__';

  if(fanlogArtistFilter!=='__all__') filtered = filtered.filter(f=>f.artist===fanlogArtistFilter);

  /* 依日期排序：離今天最近的排最前面（無論是過去或未來） */
  filtered.sort((a,b)=> Math.abs(new Date(a.date)-new Date(today)) - Math.abs(new Date(b.date)-new Date(today)));

  const filterLabel = fanlogMonthFilter ? `${fanlogMonthFilter.replace('-','/')}` : `${fanlogYearFilter}`;
  let listHtml = `<div class="cal-daylist-title">
    ${filterLabel} 的活動
    ${fanlogMonthFilter ? `<button class="chip-clear" id="clearFanlogMonthFilter">清除月份篩選 ✕</button>` : ''}
  </div>`;

  if(artistNames.length>0){
    listHtml += `<div class="cal-filter-row">
      <button class="cal-filter-btn ${fanlogArtistFilter==='__all__'?'active':''}" data-filter="__all__">全部藝人</button>
      ${artistNames.map(n=>`<button class="cal-filter-btn ${fanlogArtistFilter===n?'active':''}" data-filter="${esc(n)}">${esc(n)}</button>`).join('')}
    </div>`;
  }

  if(filtered.length===0){
    listHtml += `<div class="empty"><div class="big">${meta.emptyIcon}</div><div class="msg">這段時間還沒有紀錄<br>點右下角的「＋」新增一筆吧</div></div>`;
  } else {
    listHtml += `<div class="list-grid">`;
    filtered.forEach(item=>{ listHtml += renderCard('fanlog', item); });
    listHtml += `</div>`;
  }

  html += `<div class="sched-layout">
    <div class="sched-cal-col">${reviewHtml}</div>
    <div class="sched-list-col">${listHtml}</div>
  </div>`;
  return html;
}

function bindFanlogReviewActions(){
  document.querySelectorAll('.year-filter-btn').forEach(el=>{
    el.addEventListener('click', ()=>{
      fanlogYearFilter = el.dataset.year;
      fanlogMonthFilter = null;
      render();
    });
  });
  document.querySelectorAll('.month-card').forEach(el=>{
    el.addEventListener('click', ()=>{
      fanlogMonthFilter = el.dataset.ym;
      render();
    });
  });
  const clearBtn = document.getElementById('clearFanlogMonthFilter');
  if(clearBtn){
    clearBtn.addEventListener('click', ()=>{
      fanlogMonthFilter = null;
      render();
    });
  }
  document.querySelectorAll('.cal-filter-btn[data-filter]').forEach(b=>{
    b.addEventListener('click', ()=>{
      fanlogArtistFilter = b.dataset.filter;
      render();
    });
  });
}

/* ================= Common Helper Modals ================= */
function openProfileForm(){
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <h3 class="maru">設定 / 登入</h3>
    <div class="field"><label>暱稱</label><input type="text" id="profNickname" value="${esc(state.profile.nickname||'')}" placeholder="輸入你的名字"></div>
    <div class="field">
      <button type="button" class="btn ghost" id="goArtistsBtn" style="width:100%;">✨ 管理藝人</button>
    </div>
    <div class="modal-actions">
      <button class="btn ghost" id="cancelBtn">取消</button>
      <button class="btn primary" id="saveProfBtn">儲存</button>
    </div>
  `;
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  document.getElementById('goArtistsBtn').addEventListener('click', ()=>{
    closeModal();
    state.tab = 'artists';
    render();
  });
  document.getElementById('saveProfBtn').addEventListener('click', async ()=>{
    state.profile.nickname = document.getElementById('profNickname').value.trim();
    await saveKey('oshi-profile', state.profile);
    closeModal();
    renderProfile();
    render();
    showToast('已更新個人資料');
  });
  showModal();
}

function confirmDelete(tab, id){
  const modal = document.getElementById('modal');
  modal.innerHTML = `
    <h3 class="maru">確定要刪除嗎？</h3>
    <p style="font-size:13px;color:var(--ink-soft);margin-bottom:16px;">刪除後資料將無法復原。</p>
    <div class="modal-actions">
      <button class="btn ghost" id="cancelBtn">取消</button>
      <button class="btn danger" id="delConfirmBtn">確定刪除</button>
    </div>
  `;
  document.getElementById('cancelBtn').addEventListener('click', closeModal);
  document.getElementById('delConfirmBtn').addEventListener('click', async ()=>{
    state[tab] = state[tab].filter(i=>String(i.id)!==String(id));
    await saveKey('oshi-'+tab, state[tab]);
    closeModal();
    render();
    showToast('已刪除紀錄');
  });
  showModal();
}

function showModal(){ document.getElementById('overlay').classList.add('show'); }
function closeModal(){ document.getElementById('overlay').classList.remove('show'); }

function showToast(msg){
  const toast = document.getElementById('toast');
  toast.textContent = msg;
  toast.classList.add('show');
  setTimeout(()=> toast.classList.remove('show'), 2200);
}

/* 啟動應用程式 */
window.addEventListener('DOMContentLoaded', init);
</script>
